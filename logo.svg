    <path d="M48,28 C56,45 56,63 48,78 C40,63 40,45 48,28 Z" transform="rotate(32 48 78)"/>
  </g>
  <!-- center teal petal -->
  <path d="M48,24 C57,44 57,62 48,78 C39,62 39,44 48,24 Z" fill="#16A89B"/>
  <!-- head profile -->
