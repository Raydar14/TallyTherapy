  <!-- outer gold petals -->
  <g fill="#F2C94C">
    <path d="M48,40 C58,52 60,66 48,78 C36,66 38,52 48,40 Z" transform="rotate(-62 48 78)"/>
    <path d="M48,40 C58,52 60,66 48,78 C36,66 38,52 48,40 Z" transform="rotate(62 48 78)"/>
